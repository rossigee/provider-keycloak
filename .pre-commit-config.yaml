repos:
  # Go formatting
  - repo: local
    hooks:
      - id: go-fmt
        name: Go fmt
        entry: go fmt ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [commit]

      - id: go-vet
        name: Go vet
        entry: go vet ./...
        language: system
        types: [go]
        pass_filenames: false
        stages: [commit]

      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run --fix
        language: system
        types: [go]
        pass_filenames: false
        stages: [commit]

  # Prevent large files from being committed
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
        stages: [commit]

      - id: end-of-file-fixer
        name: Fix end of file
        stages: [commit]

      - id: check-yaml
        name: Check YAML
        args: ['--safe']
        stages: [commit]

      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=500']
        stages: [commit]

      - id: check-merge-conflict
        name: Check for merge conflicts
        stages: [commit]

  # Markdown linting
  - repo: https://github.com/markdownlint/markdownlint
    rev: v0.12.0
    hooks:
      - id: markdownlint
        name: Markdown lint
        types: [markdown]
        args: ['--fix']
        stages: [commit]

  # YAML formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        name: Prettier (YAML/JSON)
        types: [yaml, json]
        stages: [commit]

  # Security checks
  - repo: https://github.com/semgrep/semgrep
    rev: v1.45.0
    hooks:
      - id: semgrep
        name: Semgrep security scan
        types: [go]
        language: system
        entry: semgrep --quiet --error --config=p/security-audit
        pass_filenames: false
        stages: [push]
