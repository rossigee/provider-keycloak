name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g., v0.2.18)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true

      - name: Determine Version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Build Crossplane CLI
        run: go install github.com/crossplane/cli/v2/cmd/crossplane@v2.4.0

      - name: Vendor Dependencies
        run: go mod vendor

      - name: Install Build Tools
        run: make build.init

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and Publish Artifacts
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH_NAME: master
          REGISTRY_ORGS: ghcr.io/rossigee
          XPKG_REG_ORGS: ghcr.io/rossigee
        run: make publish.artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true

      - name: Verify Publication
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Verifying publication to ghcr.io/rossigee/provider-keycloak:${VERSION}"
          docker pull "ghcr.io/rossigee/provider-keycloak:${VERSION}" && echo "✅ Verified" || echo "❌ Failed"