name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true

      - name: Extract version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'

      - name: Vendor dependencies
        run: go mod vendor

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Install Crossplane CLI
        run: |
          go install github.com/crossplane/cli/v2/cmd/crossplane@v2.4.0

      - name: Build binary
        run: |
          mkdir -p _output/bin/linux_amd64
          go build -o _output/bin/linux_amd64/provider ./cmd/provider

      - name: Prepare build context
        run: |
          mkdir -p bin/linux_amd64
          cp _output/bin/linux_amd64/provider bin/linux_amd64/provider

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./cluster/images/provider-keycloak/Dockerfile
          push: true
          tags: ghcr.io/rossigee/provider-keycloak:${{ steps.version.outputs.version }}

      - name: Build xpkg
        run: |
          crossplane xpkg build \
            --package-root package/ \
            --package-file _output/xpkg/linux_amd64/provider-keycloak-${{ steps.version.outputs.version }}.xpkg

      - name: Push xpkg
        run: |
          crossplane xpkg push \
            --package-files _output/xpkg/linux_amd64/provider-keycloak-${{ steps.version.outputs.version }}.xpkg \
            ghcr.io/rossigee/provider-keycloak:${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true