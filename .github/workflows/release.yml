# Custom Release Workflow for provider-keycloak
# Publishes to ghcr.io/rossigee using the crossplane build system.
name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      packages: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: true

      - name: Determine Version
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Build Crossplane CLI
        run: go install github.com/crossplane/cli/v2/cmd/crossplane@v2.4.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Artifacts
        run: |
          go mod vendor
          export VERSION="${{ steps.version.outputs.version }}"
          export BRANCH_NAME="master"
          export PLATFORMS=linux_amd64
          export REGISTRY="ghcr.io/rossigee"
          export IMAGE="ghcr.io/rossigee/provider-keycloak"
          make CROSSPLANE_CLI=/home/runner/go/bin/crossplane build.all build.artifacts

      - name: Build and Publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BRANCH_NAME: master
          REGISTRY_ORGS: ghcr.io/rossigee
          XPKG_REG_ORGS: ghcr.io/rossigee
        run: make publish.artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true